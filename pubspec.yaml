name: there_yet
description: Location-based alarm app
publish_to: "none"
version: 1.0.2+8
license: EUPL-1.2

environment:
  sdk: ^3.11.0

dependencies:
  drift: ^2.32.0
  dynamic_color: ^1.8.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_foreground_task: ^9.2.1
  flutter_map: ^8.2.2
  flutter_riverpod: ^3.3.1
  geolocator: ^14.0.2
  go_router: ^17.1.0
  http: ^1.4.0
  url_launcher: ^6.3.1
  latlong2: ^0.9.1
  path: ^1.9.1
  package_info_plus: ^9.0.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.4
  sqlite3_flutter_libs: ^0.6.0+eol

dev_dependencies:
  build_runner: ^2.13.0
  drift_dev: ^2.32.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon.png
