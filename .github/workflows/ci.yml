name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
        continue-on-error: true

      - name: Check formatting
        run: nix build .#checks.x86_64-linux.formatting

  analyze:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          cache: true

      - name: Cache SQLite amalgamation
        id: sqlite-cache
        uses: actions/cache@v4
        with:
          path: vendor/sqlite/sqlite3.c
          key: sqlite-amalgamation-3500200

      - name: Fetch SQLite amalgamation
        if: steps.sqlite-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p vendor/sqlite
          curl -fSL -o /tmp/sqlite.zip \
            https://www.sqlite.org/2025/sqlite-amalgamation-3500200.zip
          unzip -j /tmp/sqlite.zip 'sqlite-amalgamation-3500200/sqlite3.c' \
            -d vendor/sqlite/
          rm /tmp/sqlite.zip

      - name: Verify SQLite amalgamation
        run: |
          echo "c9a0b6829b81d5f1b78392181f09744c818117a725667411d517b98149fcd3be  vendor/sqlite/sqlite3.c" \
            | sha256sum -c -

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Analyze
        run: flutter analyze --fatal-infos

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          cache: true

      - name: Cache SQLite amalgamation
        id: sqlite-cache
        uses: actions/cache@v4
        with:
          path: vendor/sqlite/sqlite3.c
          key: sqlite-amalgamation-3500200

      - name: Fetch SQLite amalgamation
        if: steps.sqlite-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p vendor/sqlite
          curl -fSL -o /tmp/sqlite.zip \
            https://www.sqlite.org/2025/sqlite-amalgamation-3500200.zip
          unzip -j /tmp/sqlite.zip 'sqlite-amalgamation-3500200/sqlite3.c' \
            -d vendor/sqlite/
          rm /tmp/sqlite.zip

      - name: Verify SQLite amalgamation
        run: |
          echo "c9a0b6829b81d5f1b78392181f09744c818117a725667411d517b98149fcd3be  vendor/sqlite/sqlite3.c" \
            | sha256sum -c -

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Run tests
        run: flutter test
