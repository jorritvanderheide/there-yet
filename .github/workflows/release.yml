name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/upload-keystore.jks

      - name: Create key.properties
        run: |
          printf '%s\n' \
            "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" \
            "keyPassword=${{ secrets.KEY_PASSWORD }}" \
            "keyAlias=upload" \
            "storeFile=../upload-keystore.jks" \
            > android/key.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build App Bundle (Play Store)
        run: flutter build appbundle --release

      - name: Build APK (F-Droid)
        run: flutter build apk --release --dart-define=STORE=fdroid

      - name: Rename artifacts
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/there-yet-fdroid.apk

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/there-yet-fdroid.apk
          generate_release_notes: true
