name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: Run CI checks
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          cache: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Cache SQLite amalgamation
        id: sqlite-cache
        uses: actions/cache@v4
        with:
          path: vendor/sqlite/sqlite3.c
          key: sqlite-amalgamation-3500200

      - name: Fetch SQLite amalgamation
        if: steps.sqlite-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p vendor/sqlite
          curl -fSL -o /tmp/sqlite.zip \
            https://www.sqlite.org/2025/sqlite-amalgamation-3500200.zip
          unzip -j /tmp/sqlite.zip 'sqlite-amalgamation-3500200/sqlite3.c' \
            -d vendor/sqlite/
          rm /tmp/sqlite.zip

      - name: Verify SQLite amalgamation
        run: |
          echo "c9a0b6829b81d5f1b78392181f09744c818117a725667411d517b98149fcd3be  vendor/sqlite/sqlite3.c" \
            | sha256sum -c -

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/upload-keystore.jks

      - name: Create key.properties
        run: |
          printf '%s\n' \
            "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" \
            "keyPassword=${{ secrets.KEY_PASSWORD }}" \
            "keyAlias=upload" \
            "storeFile=../upload-keystore.jks" \
            > android/key.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build App Bundle (Play Store)
        run: flutter build appbundle --release

      - name: Build APKs (F-Droid)
        run: flutter build apk --release --split-per-abi --target-platform=android-arm,android-arm64 --dart-define=STORE=fdroid

      - name: Rename APK artifacts
        working-directory: build/app/outputs/flutter-apk
        run: |
          mv app-arm64-v8a-release.apk there-yet-arm64-v8a.apk
          mv app-armeabi-v7a-release.apk there-yet-armeabi-v7a.apk

      - name: Verify APK signatures
        run: |
          apksigner=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -n1)
          for apk in build/app/outputs/flutter-apk/there-yet-*.apk; do
            "$apksigner" verify --verbose --print-certs "$apk"
          done

      - name: Generate SHA256 checksums
        run: |
          ( cd build/app/outputs/flutter-apk && sha256sum there-yet-*.apk )  > SHA256SUMS
          ( cd build/app/outputs/bundle/release && sha256sum app-release.aab )  >> SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/there-yet-arm64-v8a.apk
            build/app/outputs/flutter-apk/there-yet-armeabi-v7a.apk
            SHA256SUMS
          generate_release_notes: true
